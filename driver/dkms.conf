PACKAGE_NAME="audient_id"
PACKAGE_VERSION="0.1"
BUILT_MODULE_NAME[0]="audient_id"
DEST_MODULE_LOCATION[0]="/extra"
AUTOINSTALL="yes"
# CachyOS/Arch kernels are built with Clang; pass LLVM=1 through to the module build.
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules LLVM=1"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean LLVM=1"
