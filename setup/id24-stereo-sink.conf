# Monix — clean stereo sink for the Audient iD24
#
# The iD24 presents itself to PipeWire as a single 16-channel sink with an
# all-"aux" channel map (aux0..aux15) and no front-left/front-right positions.
# Games and surround-aware apps then either render 7.1 across channels your
# monitors don't carry, or mis-map stereo — audio "bugs out" / goes missing.
#
# This creates a normal 2-channel sink ("iD24 Stereo") whose FL/FR are wired to
# the iD24's first playback pair = DAW 1+2 (aux0/aux1), i.e. what your Main mix
# monitors. Point games / the desktop at it and stereo always lands correctly,
# while the full 16-channel device stays available for DAWs.
#
# Install:  cp setup/id24-stereo-sink.conf ~/.config/pipewire/pipewire.conf.d/
#           systemctl --user restart pipewire pipewire-pulse
# Then set "iD24 Stereo" as the default output (pavucontrol or your sound panel).

context.modules = [
  { name = libpipewire-module-loopback
    args = {
      node.description = "iD24 Stereo"
      capture.props = {
        media.class    = Audio/Sink
        node.name      = "id24_stereo"
        audio.position = [ FL FR ]
      }
      playback.props = {
        node.name        = "id24_stereo.playback"
        audio.position   = [ AUX0 AUX1 ]
        node.target      = "alsa_output.usb-Audient_Audient_iD24-00.multichannel-output"
        stream.dont-remix = true
        node.passive     = true
      }
    }
  }
]
