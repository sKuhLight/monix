# Monix — Windows-style device split for the Audient iD24
#
# The iD24 is class-compliant: Linux sees ONE 16-ch output + 12-ch input node.
# Audient's Windows/macOS driver splits that into named stereo endpoints; this
# config recreates the same thing in the PipeWire graph — a set of normal stereo
# sinks/sources, each wired to one channel pair of the real device. Apps (and
# games) see clean 2-channel devices; the full multichannel node stays available
# for DAWs.
#
# Channel map (verified): playback aux0..15 = DAW returns 1..16; capture
# aux0/1 = Mic 1/2, aux2..9 = ADAT/Digi 1..8, aux10/11 = loopback.
#
# Requires the card's Duplex profile (output+input). Set it once in pavucontrol
# ("Mehrkanal-Duplex") — WirePlumber remembers it — or:
#   pactl set-card-profile alsa_card.usb-Audient_Audient_iD24-00 \
#         output:multichannel-output+input:multichannel-input
#
# Install:  cp setup/id24-split.conf ~/.config/pipewire/pipewire.conf.d/
#           systemctl --user restart pipewire pipewire-pulse

context.modules = [
  # ---------- OUTPUTS (playback sinks -> device) ----------
  { name = libpipewire-module-loopback
    args = { node.description = "iD24 Main 1+2"
      capture.props  = { media.class=Audio/Sink node.name=id24_main12 audio.position=[FL FR] }
      playback.props = { node.name=id24_main12.pb audio.position=[AUX0 AUX1]
        node.target="alsa_output.usb-Audient_Audient_iD24-00.multichannel-output"
        stream.dont-remix=true node.passive=true } } }

  { name = libpipewire-module-loopback
    args = { node.description = "iD24 Out 3+4"
      capture.props  = { media.class=Audio/Sink node.name=id24_out34 audio.position=[FL FR] }
      playback.props = { node.name=id24_out34.pb audio.position=[AUX2 AUX3]
        node.target="alsa_output.usb-Audient_Audient_iD24-00.multichannel-output"
        stream.dont-remix=true node.passive=true } } }

  { name = libpipewire-module-loopback
    args = { node.description = "iD24 Phones 5+6"
      capture.props  = { media.class=Audio/Sink node.name=id24_phones56 audio.position=[FL FR] }
      playback.props = { node.name=id24_phones56.pb audio.position=[AUX4 AUX5]
        node.target="alsa_output.usb-Audient_Audient_iD24-00.multichannel-output"
        stream.dont-remix=true node.passive=true } } }

  # ---------- INPUTS (capture sources <- device) ----------
  { name = libpipewire-module-loopback
    args = { node.description = "iD24 Mic 1+2"
      capture.props  = { node.name=id24_mic12.cap audio.position=[AUX0 AUX1]
        node.target="alsa_input.usb-Audient_Audient_iD24-00.multichannel-input"
        stream.dont-remix=true node.passive=true }
      playback.props = { media.class=Audio/Source node.name=id24_mic12 audio.position=[FL FR] } } }

  { name = libpipewire-module-loopback
    args = { node.description = "iD24 ADAT 1+2"
      capture.props  = { node.name=id24_adat12.cap audio.position=[AUX2 AUX3]
        node.target="alsa_input.usb-Audient_Audient_iD24-00.multichannel-input"
        stream.dont-remix=true node.passive=true }
      playback.props = { media.class=Audio/Source node.name=id24_adat12 audio.position=[FL FR] } } }

  { name = libpipewire-module-loopback
    args = { node.description = "iD24 Loopback"
      capture.props  = { node.name=id24_loop.cap audio.position=[AUX10 AUX11]
        node.target="alsa_input.usb-Audient_Audient_iD24-00.multichannel-input"
        stream.dont-remix=true node.passive=true }
      playback.props = { media.class=Audio/Source node.name=id24_loopback audio.position=[FL FR] } } }

  # Add more pairs by copying a block and bumping the AUX indices
  # (ADAT 3+4 = AUX4 AUX5, 5+6 = AUX6 AUX7, 7+8 = AUX8 AUX9, etc.).
]
