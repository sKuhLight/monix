name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  userspace:
    name: Build app + lib + CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config \
            libasound2-dev libglfw3-dev libgl1-mesa-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j"$(nproc)"
      - name: Show artifacts
        run: ls -la build/app/monix-gui build/monixctl

  kernel-module:
    name: Compile kernel module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kernel headers + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential linux-headers-generic
      - name: Build module against generic headers
        run: |
          KDIR=$(ls -d /usr/src/linux-headers-*-generic | sort -V | tail -1)
          echo "Building against $KDIR"
          make -C driver KDIR="$KDIR"
          ls -la driver/audient_id.ko
